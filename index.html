<!DOCTYPE html>
<html>
<head>
<title>password strength checker</title>
</head>
<body>
<h2>Password strength checker</h2>
<p>enter a password to see if it is <mark>Weak</mark>, Medium, or Strong.</p>
<input type="password" id="password" placeholder="Enter password">
<button onclick="checkPassword()">Check</button>
<p id="result"></p>
<details>
<summary>Password Requirements</summary>
    <ol> <li>At least 8 characters</li>
        <li>Contains a number</li> <li>Contains an uppercase letter</li>
</ol>
<ul>
    <li>Strong passwords are harder to guess</li>
<li>Avod using your name or birthdate</li>    </ul>
</details>
<script>
function checkPassword() {
var pass = document.getElementById("password").value;
var strength = "Weak";
if (pass.length >= 8) { strength = "Medium";
}
if (pass.length >= 8 &&
        /[0-9]/.test(pass) &&
        /[A-Z]/.test(pass)) {
        strength = "Strong";}
    document.getElementById("result").innerText ="Password Strength: " + strength;}
</script>
</body>
</html>
